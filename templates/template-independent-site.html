<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}}</title>
  <style>
    :root {
      {{PALETTE_VARS}}
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      background: var(--bg);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
    }
    .hero {
      min-height: 82vh;
      display: grid;
      align-content: center;
      padding: 72px clamp(22px, 7vw, 96px);
      background: var(--primary);
      color: var(--bg);
    }
    .hero h1 {
      margin: 0;
      max-width: 1000px;
      font-size: clamp(48px, 9vw, 112px);
      line-height: 0.96;
      letter-spacing: 0;
    }
    .hero .slogan {
      margin: 22px 0 0;
      max-width: 760px;
      font-size: clamp(22px, 4vw, 42px);
      color: var(--secondary);
    }
    .hero .one-liner {
      margin: 18px 0 0;
      max-width: 680px;
      font-size: 18px;
    }
    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 56px clamp(20px, 5vw, 72px);
    }
    section {
      padding: 46px 0;
      border-bottom: 1px solid color-mix(in srgb, var(--text) 10%, transparent);
    }
    section:last-child { border-bottom: 0; }
    h2 {
      margin: 0 0 16px;
      color: var(--primary);
      font-size: clamp(30px, 5vw, 56px);
      line-height: 1.05;
      letter-spacing: 0;
    }
    p, li { font-size: 18px; }
    ul { padding-left: 1.2em; }
    .cta {
      padding: 52px clamp(20px, 5vw, 72px);
      background: var(--secondary);
      color: var(--primary);
    }
    .cta strong {
      display: block;
      max-width: 760px;
      font-size: clamp(28px, 5vw, 54px);
      line-height: 1.08;
    }
  </style>
</head>
<body>
  {{HERO}}
  <main>
    {{SECTIONS}}
  </main>
  {{CTA}}
</body>
</html>
